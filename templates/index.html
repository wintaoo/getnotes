<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GetNotes — AI 技术笔记生成</title>
<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="切换主题">☀</button>
<div class="container">
  <header>
    <h1>GetNotes</h1>
    <p>微信公众号技术文章 → 面试级结构化笔记</p>
  </header>

  <div class="main-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="card">
        <div class="sidebar-header">
          <h2>历史笔记</h2>
          <button class="btn-icon" onclick="loadHistory()" title="刷新">↻</button>
        </div>
        <div class="index-link" onclick="loadNote('index.md')">
          <span class="index-icon">📑</span>
          <span>笔记索引</span>
        </div>
        <input class="search-box" type="text" id="searchBox" placeholder="搜索笔记..." oninput="filterNotes()">
        <ul class="note-list" id="historyList">
          <li class="empty-state"><div class="empty-icon">📝</div>暂无笔记</li>
        </ul>
      </div>
    </aside>

    <!-- Main -->
    <main class="content-area">
      <!-- Input Card -->
      <div class="card" id="inputCard">
        <div class="input-header">
          <h2>输入 URL</h2>
          <select id="modelSelect" class="model-select">
            <option value="deepseek-v4-pro">DeepSeek V4 Pro</option>
            <option value="deepseek-v4-flash">DeepSeek V4 Flash</option>
            <option value="deepseek-chat">DeepSeek V3</option>
            <option value="deepseek-reasoner">DeepSeek R1</option>
          </select>
        </div>

        <!-- Tabs -->
        <div class="input-tabs">
          <button class="input-tab active" onclick="switchTab('single')">单个 URL</button>
          <button class="input-tab" onclick="switchTab('multi')">批量 URL</button>
          <button class="input-tab" onclick="switchTab('file')">上传文件</button>
        </div>

        <!-- Single URL -->
        <div class="tab-panel active" id="panel-single">
          <div class="input-row">
            <input type="url" id="singleUrl" placeholder="粘贴微信公众号或其他技术文章 URL" autofocus>
            <button class="btn btn-primary" onclick="submitSingle()">生成笔记</button>
          </div>
        </div>

        <!-- Multi URL -->
        <div class="tab-panel" id="panel-multi">
          <textarea id="multiUrls" placeholder="每行输入一个 URL，支持批量处理"></textarea>
          <button class="btn btn-primary" onclick="submitMulti()" style="width:100%">批量生成笔记</button>
        </div>

        <!-- File upload -->
        <div class="tab-panel" id="panel-file">
          <div class="file-upload">
            <label for="fileInput">📁 选择 .txt 文件</label>
            <input type="file" id="fileInput" accept=".txt" onchange="handleFile(this)">
            <span class="file-name" id="fileName"></span>
          </div>
          <button class="btn btn-primary" onclick="submitFile()" style="margin-top:12px;display:none" id="fileSubmitBtn">处理文件中的 URL</button>
        </div>

      </div>

      <!-- Task status bar -->
      <div class="task-bar" id="taskBar">
        <span class="task-dot"></span>
        <span class="task-text" id="taskText"></span>
        <span class="task-progress"><span class="task-fill" id="taskFill"></span></span>
      </div>

      <!-- Preview -->
      <div class="preview-area card" id="previewArea">
        <div class="preview-header">
          <h2 id="previewTitle">笔记预览</h2>
          <div class="preview-actions" id="previewActionsView">
            <button class="btn btn-secondary btn-sm" onclick="editNote()">编辑</button>
            <button class="btn btn-secondary btn-sm" onclick="copyNotes()">复制</button>
            <button class="btn btn-primary btn-sm" onclick="downloadNotes()">下载 .md</button>
          </div>
          <div class="preview-actions" id="previewActionsEdit" style="display:none">
            <button class="btn btn-primary btn-sm" onclick="saveEdit()">保存</button>
            <button class="btn btn-secondary btn-sm" onclick="cancelEdit()">取消</button>
          </div>
        </div>
        <div class="preview-meta" id="previewMeta"></div>
        <div id="resultTabs" class="result-tabs"></div>
        <div class="note-content" id="noteContent"></div>
        <textarea class="note-editor" id="noteEditor" style="display:none" spellcheck="false"></textarea>
      </div>
    </main>
  </div>
</div>

<div id="toast" class="toast" style="display:none"></div>

<script>
// State
let currentResults = [];
let currentIndex = 0;
let fileUrls = [];
let historyData = [];

// Theme
function initTheme() {
  const saved = localStorage.getItem('theme');
  if (saved === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    document.getElementById('themeToggle').textContent = '☾';
  }
}
function toggleTheme() {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  if (isLight) {
    document.documentElement.removeAttribute('data-theme');
    document.getElementById('themeToggle').textContent = '☀';
    localStorage.setItem('theme', 'dark');
  } else {
    document.documentElement.setAttribute('data-theme', 'light');
    document.getElementById('themeToggle').textContent = '☾';
    localStorage.setItem('theme', 'light');
  }
}
initTheme();

// Init
window.onload = () => loadHistory();
document.getElementById('singleUrl').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitSingle();
});

// --- Tab switching ---
function switchTab(name) {
  document.querySelectorAll('.input-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.input-tab[onclick*="${name}"]`).classList.add('active');
  document.getElementById(`panel-${name}`).classList.add('active');
  if (name === 'single') document.getElementById('singleUrl').focus();
}

// --- Toast ---
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}

// --- History ---
async function loadHistory() {
  try {
    const res = await fetch('/api/notes');
    const data = await res.json();
    historyData = data.notes || [];
    renderHistory(historyData);
  } catch(e) {
    document.getElementById('historyList').innerHTML = '<li class="empty-state"><div class="empty-icon">⚠</div>加载失败</li>';
  }
}

function renderHistory(notes) {
  const list = document.getElementById('historyList');
  if (!notes.length) {
    list.innerHTML = '<li class="empty-state"><div class="empty-icon">📝</div>暂无笔记</li>';
    return;
  }
  list.innerHTML = notes.map(n => {
    const tag = n.tag || '';
    return `
    <li data-file="${escapeAttr(n.filename)}">
      <div class="note-info" onclick="loadNote('${escapeAttr(n.filename)}')">
        <div class="note-title">${escapeHtml(n.filename.replace('.md', ''))}</div>
        <div class="note-meta">
          <span>${formatDate(n.mtime)}</span>
          <span>${formatSize(n.size)}</span>
        </div>
      </div>
      <button class="btn-tag tag-${tag || 'none'}" onclick="cycleTag(event, '${escapeAttr(n.filename)}')" title="切换标签">${tag || '+'}</button>
      <button class="btn-regen" onclick="regenNote(event, '${escapeAttr(n.filename)}')" title="重新生成">🔄</button>
      <button class="btn-delete" onclick="deleteNote(event, '${escapeAttr(n.filename)}')" title="删除">×</button>
    </li>
  `}).join('');
}

function addToHistory(note) {
  historyData.unshift(note);
  const list = document.getElementById('historyList');
  const empty = list.querySelector('.empty-state');
  if (empty) empty.remove();
  const item = document.createElement('li');
  item.setAttribute('data-file', note.filename);
  item.innerHTML = `
    <div class="note-info" onclick="loadNote('${escapeAttr(note.filename)}')">
      <div class="note-title">${escapeHtml(note.filename.replace('.md', ''))}</div>
      <div class="note-meta">
        <span>${formatDate(note.mtime)}</span>
        <span>${formatSize(note.size)}</span>
      </div>
    </div>
    <button class="btn-tag tag-none" onclick="cycleTag(event, '${escapeAttr(note.filename)}')" title="切换标签">+</button>
    <button class="btn-regen" onclick="regenNote(event, '${escapeAttr(note.filename)}')" title="重新生成">🔄</button>
    <button class="btn-delete" onclick="deleteNote(event, '${escapeAttr(note.filename)}')" title="删除">×</button>
  `;
  list.insertBefore(item, list.firstChild);
}

const TAG_ORDER = ['', '优', '良', '中', '差'];

async function cycleTag(event, filename) {
  event.stopPropagation();
  const btn = event.currentTarget;
  const current = btn.textContent === '+' ? '' : btn.textContent;
  const idx = TAG_ORDER.indexOf(current);
  const next = TAG_ORDER[(idx + 1) % TAG_ORDER.length];

  try {
    await fetch(`/api/tags/${encodeURIComponent(filename)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tag: next })
    });
    btn.textContent = next || '+';
    btn.className = `btn-tag tag-${next || 'none'}`;
    // Update historyData
    const note = historyData.find(n => n.filename === filename);
    if (note) note.tag = next;
  } catch(e) {
    showToast('标签设置失败');
  }
}

async function regenNote(event, filename) {
  event.stopPropagation();
  if (!confirm(`确定重新生成「${filename.replace('.md', '')}」?`)) return;
  const model = document.getElementById('modelSelect').value;
  showToast('重新生成中...');
  try {
    const res = await fetch(`/api/regenerate/${encodeURIComponent(filename)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model })
    });
    if (res.ok) {
      const data = await res.json();
      currentResults = [{ filename: data.filename, content: data.content, title: data.title, url: data.url, error: null, _time: 0 }];
      currentIndex = 0;
      showPreview(currentResults[0], 0);
      showToast('已重新生成');
    } else {
      const err = await res.json();
      showToast('重新生成失败: ' + (err.error || 'unknown'));
    }
  } catch(e) {
    showToast('重新生成失败');
  }
}

async function deleteNote(event, filename) {
  event.stopPropagation();
  if (!confirm(`确定删除「${filename.replace('.md', '')}」?`)) return;
  try {
    const res = await fetch(`/api/notes/${encodeURIComponent(filename)}`, { method: 'DELETE' });
    if (res.ok) {
      showToast('已删除');
      loadHistory();
      const area = document.getElementById('previewArea');
      if (area.classList.contains('active') && currentResults[currentIndex]?.filename === filename) {
        area.classList.remove('active');
      }
    }
  } catch(e) {
    showToast('删除失败');
  }
}

function filterNotes() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  const filtered = historyData.filter(n => n.filename.toLowerCase().includes(q));
  renderHistory(filtered);
}

async function loadNote(filename) {
  document.querySelectorAll('.note-list li').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-file="${escapeAttr(filename)}"]`)?.classList.add('active');
  if (generationRunning) userBrowsing = true;
  try {
    const res = await fetch(`/api/notes/${encodeURIComponent(filename)}`);
    const data = await res.json();
    currentResults = [{ filename: data.filename, content: data.content, title: data.filename.replace('.md', ''), url: '', error: null }];
    currentIndex = 0;
    showPreview(currentResults[0], 0);
  } catch(e) {
    showToast('加载笔记失败');
  }
}

// --- Submission ---
function submitSingle() {
  const url = document.getElementById('singleUrl').value.trim();
  if (!url) { showToast('请输入 URL'); return; }
  generate([url]);
  document.getElementById('singleUrl').value = '';
}

function submitMulti() {
  const text = document.getElementById('multiUrls').value.trim();
  if (!text) { showToast('请输入 URL'); return; }
  const urls = text.split('\n').map(s => s.trim()).filter(Boolean);
  generate(urls);
  document.getElementById('multiUrls').value = '';
}

function handleFile(input) {
  const file = input.files[0];
  document.getElementById('fileName').textContent = file ? file.name : '';
  document.getElementById('fileSubmitBtn').style.display = file ? 'inline-flex' : 'none';
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    fileUrls = e.target.result.split('\n').map(s => s.trim()).filter(l => l && !l.startsWith('#'));
  };
  reader.readAsText(file);
}

function submitFile() {
  if (!fileUrls.length) { showToast('文件中未找到有效 URL'); return; }
  generate(fileUrls);
}

// --- Generate ---
let generationRunning = false;
let userBrowsing = false;

async function generate(urls) {
  generationRunning = true;
  userBrowsing = false;
  const startTime = Date.now();
  currentResults = [];

  // Show compact task bar
  const taskBar = document.getElementById('taskBar');
  const taskText = document.getElementById('taskText');
  const taskFill = document.getElementById('taskFill');
  taskBar.classList.add('active');
  taskText.textContent = `处理 ${urls.length} 个 URL...`;
  taskFill.style.width = '0%';

  const model = document.getElementById('modelSelect').value;
  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ urls, model })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if (data.type === 'progress') {
            taskText.textContent = data.message;
            if (data.total) {
              taskFill.style.width = (data.current / data.total) * 100 + '%';
            }
          } else if (data.type === 'complete') {
            currentResults = data.results.map(r => ({ ...r, _time: Date.now() - startTime }));
          } else if (data.type === 'note_saved') {
            addToHistory({
              filename: data.filename,
              size: data.size,
              mtime: data.mtime
            });
          }
        } catch(e) {}
      }
    }
  } catch(e) {
    currentResults = urls.map(url => ({ url, error: e.message, title: '', filename: '', content: '', _time: 0 }));
  }

  // Done
  taskFill.style.width = '100%';
  taskText.textContent = `完成 ${currentResults.length} 篇`;

  setTimeout(() => taskBar.classList.remove('active'), 2000);
  generationRunning = false;

  // Only auto-show results if user hasn't navigated away to read another note
  if (!userBrowsing) {
    if (currentResults.length === 1) {
      showPreview(currentResults[0], 0);
    } else if (currentResults.length > 1) {
      currentIndex = 0;
      showMultiPreview();
    }
  }
}

// --- Preview ---
function showPreview(result, idx) {
  const area = document.getElementById('previewArea');
  area.classList.add('active');
  area.scrollIntoView({ behavior: 'smooth', block: 'start' });

  if (result.error) {
    document.getElementById('previewTitle').textContent = '处理失败';
    document.getElementById('previewMeta').innerHTML = '';
    document.getElementById('noteContent').innerHTML = `<p style="color:var(--red)">${escapeHtml(result.error)}</p>`;
    document.getElementById('resultTabs').innerHTML = '';
    return;
  }

  document.getElementById('previewTitle').textContent = result.title || '笔记预览';
  document.getElementById('noteContent').innerHTML = marked.parse(result.content || '');

  const wordCount = (result.content || '').length;
  const elapsed = result._time ? (result._time / 1000).toFixed(1) + 's' : '';
  document.getElementById('previewMeta').innerHTML = `
    <span>字数: ${wordCount.toLocaleString()}</span>
    ${elapsed ? `<span>耗时: ${elapsed}</span>` : ''}
    <span>文件: ${result.filename || '-'}</span>
  `;
  document.getElementById('resultTabs').innerHTML = '';
}

function showMultiPreview() {
  const tabs = document.getElementById('resultTabs');
  tabs.innerHTML = currentResults.map((r, i) => {
    const cls = i === currentIndex ? 'active' : '';
    const err = r.error ? ' error' : '';
    return `<button class="result-tab${cls}${err}" onclick="switchResult(${i})">${r.title || r.url || '#'+(i+1)}</button>`;
  }).join('');
  switchResult(0);
}

function switchResult(idx) {
  currentIndex = idx;
  document.querySelectorAll('.result-tab').forEach((tab, i) => tab.classList.toggle('active', i === idx));
  showPreview(currentResults[idx], idx);
}

// --- Actions ---
function copyNotes() {
  const r = currentResults[currentIndex];
  if (!r || r.error) return;
  navigator.clipboard.writeText(r.content).then(() => showToast('已复制到剪贴板'));
}

function downloadNotes() {
  const r = currentResults[currentIndex];
  if (!r || r.error) return;
  const blob = new Blob([r.content], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = r.filename || 'notes.md';
  a.click();
}

// --- Inline editing ---
let editingFilename = null;

function editNote() {
  const r = currentResults[currentIndex];
  if (!r || r.error) return;
  editingFilename = r.filename;
  document.getElementById('noteContent').style.display = 'none';
  document.getElementById('previewActionsView').style.display = 'none';
  const editor = document.getElementById('noteEditor');
  editor.value = r.content;
  editor.style.display = 'block';
  document.getElementById('previewActionsEdit').style.display = 'flex';
}

async function saveEdit() {
  if (!editingFilename) return;
  const content = document.getElementById('noteEditor').value;
  try {
    await fetch(`/api/notes/${encodeURIComponent(editingFilename)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content })
    });
    const r = currentResults[currentIndex];
    if (r) r.content = content;
    cancelEdit();
    showPreview(currentResults[currentIndex], currentIndex);
    showToast('已保存');
  } catch(e) {
    showToast('保存失败');
  }
}

function cancelEdit() {
  editingFilename = null;
  document.getElementById('noteEditor').style.display = 'none';
  document.getElementById('previewActionsEdit').style.display = 'none';
  document.getElementById('noteContent').style.display = '';
  document.getElementById('previewActionsView').style.display = 'flex';
}

// --- Auto-copy on selection ---
document.addEventListener('mouseup', () => {
  const sel = window.getSelection();
  const text = sel.toString().trim();
  if (!text) return;
  const content = document.getElementById('noteContent');
  const editor = document.getElementById('noteEditor');
  if (!content.contains(sel.anchorNode) && !editor.contains(sel.anchorNode)) return;
  navigator.clipboard.writeText(text).then(() => {
    showToast('已复制选中内容');
  }).catch(() => {});
});

// --- Helpers ---
function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function escapeAttr(s) {
  return s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function formatDate(ts) {
  const d = new Date(ts * 1000);
  const now = new Date();
  const diff = now - d;
  if (diff < 86400000) return '今天 ' + d.toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
  if (diff < 172800000) return '昨天';
  return d.toLocaleDateString('zh-CN', {month:'short', day:'numeric'});
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + 'B';
  return (bytes / 1024).toFixed(1) + 'KB';
}
</script>
</body>
</html>
